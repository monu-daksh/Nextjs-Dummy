name: PR Review Orchestrator

on:
  # Fires when you open a PR, push new commits to a PR, or reopen a PR
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]

  # Also fires on direct push to main (e.g. merge commit)
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build PR review tool
        run: npm run build

      - name: Run review
        env:
          # ── Phase 2: Anthropic Claude (enterprise upgrade) ─────────────────
          # When you add this secret, ALL 6 agents auto-upgrade to Claude Opus.
          # Best quality, adaptive thinking. Get key: https://console.anthropic.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # ANTHROPIC_MODEL: claude-haiku-4-5   # cheaper option
          # ── Phase 1: Free AI (first available key wins) ────────────────────
          # Groq: free, Llama 3.3 70B, 14,400 req/day → https://console.groq.com
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Gemini: free, 1M tokens/day → https://aistudio.google.com/apikey
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # ── Alternative paid AI ────────────────────────────────────────────
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ── Provider selection ─────────────────────────────────────────────
          # multi-agent = 6 specialized AI agents (auto-picks best AI above)
          # claude | groq | gemini | ollama | openai | local
          PR_REVIEW_PROVIDER: multi-agent
          # ── GitHub Issues (optional) ───────────────────────────────────────
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ISSUE_MIN_SEVERITY: high
        run: |
          # On pull_request: diff against the base branch (e.g. main)
          # On push to main: diff against the previous commit
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          else
            git diff HEAD~1...HEAD > pr.diff
          fi
          node ./dist/cli.js review --diff ./pr.diff --format github-pr > review.json

      - name: Post PR Review Comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = JSON.parse(fs.readFileSync('review.json', 'utf8'));
            const comments = Array.isArray(review.comments) ? review.comments : [];

            if (comments.length > 0) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                commit_id: context.payload.pull_request.head.sha,
                event: 'COMMENT',
                comments: comments.map((comment) => ({
                  path: comment.path,
                  line: comment.line,
                  side: 'RIGHT',
                  body: comment.body
                }))
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: 'PR Review Orchestrator: no high-confidence findings in this run.'
              });
            }

      # Uncomment to auto-create GitHub Issues for critical/high findings.
      # - name: Create GitHub Issues for Severe Findings
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     GITHUB_REPOSITORY: ${{ github.repository }}
      #     GITHUB_ISSUE_MIN_SEVERITY: high
      #   run: |
      #     node -e "
      #       const { createGitHubIssues } = await import('./dist/reporters/github-issues.js');
      #       const review = JSON.parse(require('fs').readFileSync('review.json','utf8'));
      #       const issues = await createGitHubIssues(review, { prNumber: ${{ github.event.pull_request.number }} });
      #       console.log('Created', issues.length, 'GitHub issue(s)');
      #     "

      # Uncomment to block the pipeline on high/critical findings.
      # - name: Block On Severe Findings
      #   run: |
      #     node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('review.json','utf8')); if ((r.summary?.critical_count??0)>0||(r.summary?.high_count??0)>0) process.exit(1);"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-json
          path: review.json
