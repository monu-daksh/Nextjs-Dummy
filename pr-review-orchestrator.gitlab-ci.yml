stages:
  - review

pr_review:
  image: node:20
  stage: review
  script:
    - npm install
    - npm run build
    - git diff origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD > pr.diff
    - node ./dist/cli.js review --diff ./pr.diff --format github-pr > review.json
    - cat review.json
    # Uncomment this line later if you want to block the pipeline on high/critical findings.
    # - node -e "const fs=require('fs'); const review=JSON.parse(fs.readFileSync('review.json','utf8')); if ((review.summary?.critical_count ?? 0) > 0 || (review.summary?.high_count ?? 0) > 0) process.exit(1);"
  artifacts:
    paths:
      - review.json
